<!DOCTYPE html>
<html>
<head>
    <title>Manage Patients</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <h2 class="text-center mb-4">Manage Patients</h2>

    <div class="text-end mb-3">
        <a href="/admin_dashboard" class="btn btn-secondary btn-sm">⬅ Back</a>
        <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
    </div>


    <form method="GET" class="mb-3">
      <input type="text" name="search" placeholder="Search patient..."
            class="form-control w-25 d-inline">
      <button class="btn btn-primary btn-sm">Search</button>
    </form>

    
    <table class="table table-bordered table-hover">
        <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Email</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for p in patients %}
            <tr>
                <td>{{ p.id }}</td>
                <td>{{ p.name }}</td>
                <td>{{ p.email }}</td>

                <td>
                    {% if p.is_active == 1 %}
                        <span class="badge bg-success">Active</span>
                    {% else %}
                        <span class="badge bg-danger">Blocked</span>
                    {% endif %}
                </td>

                <td>
                    <!-- Delete -->
                    <a href="/delete_patient/{{ p.id }}" 
                       class="btn btn-danger btn-sm"
                       onclick="return confirm('Delete this patient?')">
                       Delete
                    </a>

                    <!-- Toggle Status -->
                    <a href="/toggle_patient/{{ p.id }}" 
                       class="btn btn-warning btn-sm">
                       Toggle Status
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

</body>
</html>
