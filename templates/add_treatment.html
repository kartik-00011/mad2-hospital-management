<!DOCTYPE html>
<html>
<head>
    <title>Add Treatment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:500px;">
    
    <h3 class="text-center mb-4">Add Treatment</h3>

    <form method="POST">
        <input type="text" name="diagnosis" class="form-control mb-3" placeholder="Diagnosis" required>
        <input type="text" name="prescription" class="form-control mb-3" placeholder="Prescription" required>
        <textarea name="notes" class="form-control mb-3" placeholder="Notes"></textarea>

        <button class="btn btn-success w-100">Submit</button>
    </form>

    <a href="/doctor_dashboard" class="btn btn-secondary mt-3 w-100">Back</a>

</div>

</body>
</html>
