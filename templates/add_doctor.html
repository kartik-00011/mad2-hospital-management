<!DOCTYPE html>
<html>
<head>
    <title>Add Doctor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5" style="max-width:500px;">
    
    <h3 class="text-center mb-4">Add Doctor</h3>

    <form method="POST">
        <input type="text" name="name" class="form-control mb-3" placeholder="Name" required>
        <input type="email" name="email" class="form-control mb-3" placeholder="Email" required>
        <input type="password" name="password" class="form-control mb-3" placeholder="Password" required>
        <input type="text" name="specialization" class="form-control mb-3" placeholder="Specialization" required>

        <button class="btn btn-primary w-100">Add Doctor</button>
    </form>

    <a href="/admin_dashboard" class="btn btn-secondary mt-3 w-100">Back</a>

</div>

</body>
</html>
